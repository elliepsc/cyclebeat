services:

  # ── Vector Database ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: cyclebeat_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Ingestion (one-shot) ─────────────────────────────────────────
  ingest:
    build: .
    container_name: cyclebeat_ingest
    command: python ingest/ingest_pipeline.py
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RUNTIME_DB_PATH=/app/data/cyclebeat_runtime.duckdb
    depends_on:
      - qdrant
    volumes:
      - ./data:/app/data
    restart: "no"

  # ── dbt transforms (one-shot, runs after ingestion) ──────────────
  dbt:
    build: .
    container_name: cyclebeat_dbt
    command: >
      bash -c "dbt run --project-dir dbt --profiles-dir dbt &&
               dbt test --project-dir dbt --profiles-dir dbt"
    environment:
      - RUNTIME_DB_PATH=/app/data/cyclebeat_runtime.duckdb
    depends_on:
      ingest:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
    restart: "no"

  # ── FastAPI REST API ─────────────────────────────────────────────
  api:
    build: .
    container_name: cyclebeat_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RUNTIME_DB_PATH=/app/data/cyclebeat_runtime.duckdb
    depends_on:
      qdrant:
        condition: service_started
      ingest:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./.spotify_cache:/app/.spotify_cache
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Dash Coaching UI ─────────────────────────────────────────────
  app:
    build: .
    container_name: cyclebeat_app
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RUNTIME_DB_PATH=/app/data/cyclebeat_runtime.duckdb
    depends_on:
      qdrant:
        condition: service_started
      ingest:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./.spotify_cache:/app/.spotify_cache
    command: python app/coaching.py

  # ── Plotly Dash Monitoring Dashboard ────────────────────────────
  dashboard:
    build: .
    container_name: cyclebeat_dashboard
    ports:
      - "8050:8050"
    env_file: .env
    environment:
      - RUNTIME_DB_PATH=/app/data/cyclebeat_runtime.duckdb
    depends_on:
      ingest:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
    command: python app/dashboard.py

  # ── Prometheus ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: cyclebeat_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api

  # ── Grafana ──────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: cyclebeat_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=cyclebeat
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  qdrant_data:
  grafana_data:

version: "3.9"

services:

  # ── Vector Database ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: cyclebeat_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Ingestion (one-shot, se termine proprement) ──────────────────
  ingest:
    build: .
    container_name: cyclebeat_ingest
    command: python ingest/ingest_pipeline.py
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    # Le service se termine avec exit 0 → app peut démarrer
    restart: "no"

  # ── FastAPI REST API ─────────────────────────────────────────────
  api:
    build: .
    container_name: cyclebeat_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      qdrant:
        condition: service_healthy
      ingest:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./.spotify_cache:/app/.spotify_cache
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Streamlit App ────────────────────────────────────────────────
  app:
    build: .
    container_name: cyclebeat_app
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      qdrant:
        condition: service_healthy
      ingest:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./.spotify_cache:/app/.spotify_cache

volumes:
  qdrant_data:
